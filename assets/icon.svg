  <line x1="195" y1="50" x2="215" y2="65" stroke="#4FC3F7" stroke-width="1.5" opacity="0.6"/>
  <line x1="220" y1="35" x2="240" y2="50" stroke="#4FC3F7" stroke-width="1.5" opacity="0.6"/>
